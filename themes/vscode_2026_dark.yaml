  surface_1: '#202122'
  surface_2: '#242526'
  surface_3: '#2A2B2C'
  border: '#333536'
  focus_border: '#3994BCB3'
  split_pane_border: '#2A2B2C'
  main_text: '#EDEDED'
  sub_text: '#8C8C8C'
