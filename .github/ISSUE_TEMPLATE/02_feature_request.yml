name: Feature Request
description: "Have an idea for OpenWarp? Search existing requests first and upvote if it already exists."
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **OpenWarp's direction.** OpenWarp is a community fork of Warp focused on:

        - **BYOP (Bring Your Own Provider)** — any OpenAI / Anthropic / Gemini / Ollama / DeepSeek-compatible endpoint, configured locally.
        - **Local-first & privacy-first** — credentials stay on disk; cloud agent / Computer Use / telemetry are off by default.
        - **Editable system prompts** — minijinja templates, no opaque server-side assembly.
        - **Preserved Warp UX** — Blocks, Workflows, Keymaps, themes; continuously merged from upstream.
        - **Localized UI** — English + Simplified Chinese, community-extensible.

        **Out of scope:** features that require Warp's cloud account, Warp AI gateway, Warp Drive cloud sync, Warpify SSO, billing, team/enterprise admin, or Warp's first-party telemetry. Those belong to upstream Warp.
  - type: checkboxes
    attributes:
      label: "Pre-submit Checks"
      options:
        - label: "I have [searched OpenWarp feature requests](https://github.com/zerx-lab/warp/issues?q=is%3Aissue+label%3Aenhancement) and there are no duplicates."
          required: true
        - label: "I have read the [OpenWarp README](https://github.com/zerx-lab/warp#readme) and this feature is not already supported."
          required: true
        - label: "This request fits OpenWarp's BYOP / local-first / privacy-first direction (it does NOT require Warp cloud account, Warp AI gateway, Warp Drive cloud sync, Warpify SSO, billing, or telemetry)."
          required: true
  - type: textarea
    id: "describe-solution"
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: "related-to-problem"
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      description: "A clear and concise description of the underlying problem."
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: false
  - type: textarea
    id: "alignment"
    attributes:
      label: "How does this align with OpenWarp's direction?"
      description: "Briefly explain which axis it improves: BYOP coverage, local-first/privacy, prompt-template authoring, preserved Warp UX, localization, or maintainability of the upstream-sync workflow."
    validations:
      required: false
  - type: textarea
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Mockups, screenshots, links, references to similar tools (opencode, Zed, etc.), or upstream Warp behavior worth contrasting."
    validations:
      required: false
  - type: dropdown
    id: "os"
    attributes:
      label: "Operating system (OS)"
      multiple: false
      options:
        - "Select an OS"
        - macOS
        - Linux
        - Windows
        - All / not OS-specific
    validations:
      required: true
  - type: dropdown
    id: "importance"
    attributes:
      label: "How important is this feature to you?"
      multiple: false
      options:
        - "1 (Nice to have)"
        - "2"
        - "3"
        - "4"
        - "5 (Can't work without it)"
    validations:
      required: true
