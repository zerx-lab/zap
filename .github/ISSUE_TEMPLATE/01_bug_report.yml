name: Bug Report
description: "Found a bug in OpenWarp? Please search existing issues first. For SSH-specific failures, use one of the SSH templates below."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **OpenWarp** — a community fork of Warp focused on BYOP (bring-your-own-provider) AI, local credentials, and a privacy-first terminal.

        **Out of scope (please do not file here):**
        - Warp cloud account / billing / Warp AI quota / Warpify SSO / Warp Drive cloud sync — these belong to upstream Warp, not OpenWarp.
        - Issues only reproducible with Warp's first-party cloud agent (OpenWarp ships it disabled).
  - type: checkboxes
    attributes:
      label: "Pre-submit Checks"
      options:
        - label: "I have [searched OpenWarp issues](https://github.com/zerx-lab/warp/issues?q=is%3Aissue+label%3Abug) and there are no duplicates."
          required: true
        - label: "This bug is in OpenWarp itself — not in upstream Warp's cloud account, billing, Warpify SSO, or cloud-only features."
          required: true
        - label: "I have included relevant logs (`RUST_LOG=info` output, panic traces, etc.). Optional, but greatly speeds up triage."
          required: false
        - label: "If the bug is in the AI / BYOP path, I have included the provider name, base URL pattern (redacted), and model id."
          required: false
  - type: textarea
    id: "describe-the-bug"
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
      placeholder: Tell us what you see.
    validations:
      required: true
  - type: textarea
    id: "to-reproduce"
    attributes:
      label: "To reproduce"
      description: "Bug reports with a clear repro will be prioritized higher."
      placeholder: "Steps to reproduce: 1. Go to '...' 2. Click on '...' 3. Scroll down to '...' 4. See error '...'"
    validations:
      required: true
  - type: textarea
    id: "expected-behavior"
    attributes:
      label: "Expected behavior"
      description: "A clear and concise description of what you expected to happen."
      placeholder: Tell us what you expect to see.
    validations:
      required: false
  - type: textarea
    id: "screenshots-logs"
    attributes:
      label: "Screenshots, videos, and logs"
      description: "If applicable, attach screenshots/videos/logs. Redact any API keys, tokens, or personal data before posting."
    validations:
      required: false
  - type: dropdown
    id: "os"
    attributes:
      label: "Operating system (OS)"
      multiple: false
      options:
        - "Select an OS"
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: "os-version"
    attributes:
      label: "Operating system and version"
      description: "For example: Windows 10 22H2, macOS 14.5, Debian 12."
    validations:
      required: true
  - type: input
    id: "local-shell-version"
    attributes:
      label: "Shell version"
      description: "For example, `bash 5.2` / `zsh 5.9` / PowerShell 7.4. Run `bash --version`, `zsh --version`, or `$PSVersionTable`."
    validations:
      required: false
  - type: input
    id: "openwarp-version"
    attributes:
      label: "OpenWarp version / commit"
      description: "Open Settings → About to copy the version, or run `git rev-parse --short HEAD` if you built from source."
    validations:
      required: true
  - type: dropdown
    id: "ai-path"
    attributes:
      label: "AI / BYOP path involved?"
      description: "Does this bug involve the AI agent, model picker, prompt templates, or a configured BYOP provider?"
      multiple: false
      options:
        - "No — non-AI bug (terminal, blocks, UI, shortcuts, etc.)"
        - "Yes — BYOP / model / prompt template / agent path"
    validations:
      required: true
  - type: input
    id: "byop-provider"
    attributes:
      label: "BYOP provider (if applicable)"
      description: "If the bug is in the AI path, which provider/protocol? e.g. OpenAI / Anthropic / DeepSeek / Gemini / Ollama / OpenRouter / custom proxy. Do NOT paste API keys."
    validations:
      required: false
  - type: dropdown
    id: "regression"
    attributes:
      label: "Regression"
      description: "Is this a regression compared to a previous OpenWarp build?"
      multiple: false
      options:
        - "No, this issue has existed throughout my use of OpenWarp."
        - "Yes, this started after a recent OpenWarp build / upstream sync."
        - "Unknown."
    validations:
      required: true
  - type: input
    id: "last-known-good"
    attributes:
      label: "Last known good build / date (if regression)"
      description: "Most recent commit SHA or date where OpenWarp behaved as expected."
    validations:
      required: false
  - type: textarea
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Anything else worth knowing. On Linux, mention X11 vs Wayland. For graphical issues, run with `RUST_LOG=wgpu_core=info,wgpu_hal=info MESA_DEBUG=1 EGL_LOG_LEVEL=debug` and attach the output of `eglinfo`."
    validations:
      required: false
  - type: dropdown
    id: "blocker"
    attributes:
      label: "Does this block your daily use of OpenWarp?"
      description: "All feedback is reviewed even if you select 'No'."
      multiple: false
      options:
        - "No"
        - "Yes — this prevents me from using OpenWarp daily."
    validations:
      required: true
  - type: dropdown
    id: "terminals"
    attributes:
      label: "Reproducible only in OpenWarp?"
      description: "Verifying whether other terminals are affected helps narrow down the root cause."
      multiple: false
      options:
        - "Only in OpenWarp."
        - "Also reproducible in upstream Warp."
        - "Also reproducible in other terminals (iTerm2, Windows Terminal, Alacritty, etc.)."
        - "Not tested elsewhere."
    validations:
      required: true
